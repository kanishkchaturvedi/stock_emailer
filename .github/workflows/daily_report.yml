name: Daily Smart Money Report

on:
  schedule:
    - cron: '0 9 * * *'  # 9 AM UTC daily
  workflow_dispatch:  # Allow manual trigger

jobs:
  daily-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download previous database
        uses: actions/download-artifact@v4
        with:
          name: smart_money_db
          path: .
        continue-on-error: true

      - name: Populate test data (while APIs unavailable)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python populate_test_data.py

      - name: Verify test data was created
        run: sqlite3 smart_money.db "SELECT ticker, score FROM signals ORDER BY score DESC;"

      - name: Send test email
        env:
          DATABASE_PATH: smart_money.db
          PYTHONPATH: ${{ github.workspace }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          REPORT_EMAIL: ${{ secrets.REPORT_EMAIL }}
        run: python send_test_email.py

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart_money_db
          path: smart_money.db
          retention-days: 30
